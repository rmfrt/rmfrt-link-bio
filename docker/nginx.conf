server {
    listen 3000;
    server_name www.rmfrt.com;
    absolute_redirect off;

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location / {
        return 301 https://rmfrt.com$request_uri;
    }
}

server {
    listen 3000;
    server_name resume.rmfrt.com;
    absolute_redirect off;

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location / {
        return 301 https://rmfrt.com/resume/;
    }
}

server {
    listen 3000 default_server;
    server_name preview.rmfrt.xyz rmfrt.com _;
    absolute_redirect off;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
}
